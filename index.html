<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>망고여행 가격하락 실험실 — 오늘의 발견</title>
  <meta name="description" content="매일 업데이트되는 신저가 발견 랜딩페이지" />
  <meta property="og:title" content="망고여행 가격하락 실험실 — 오늘의 발견" />
  <meta property="og:description" content="오늘 발견한 신저가만 모았습니다." />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://superguava.github.io/myrealtrip-price-drop/" />
  <meta name="theme-color" content="#ffb11b" />
  <style>
    :root{--bg:#10130f;--card:#181d16;--ink:#f8f6e9;--muted:#a9ad9b;--mango:#ffb11b;--green:#8ee06f;--line:#293023;--danger:#ff6b57}*{box-sizing:border-box}body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:radial-gradient(circle at top left,#2b341f 0,#10130f 38%,#090b08 100%);color:var(--ink)}main{max-width:1040px;margin:0 auto;padding:40px 18px 72px}.badge{display:inline-flex;gap:8px;align-items:center;border:1px solid var(--line);background:rgba(255,255,255,.05);border-radius:999px;padding:9px 14px;color:var(--muted);font-size:14px}.hero{padding:42px 0 30px}.hero h1{font-size:clamp(38px,7vw,78px);line-height:.95;margin:18px 0 16px;letter-spacing:-.06em}.hero p{font-size:20px;color:var(--muted);max-width:660px;line-height:1.55}.mango{color:var(--mango)}.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin:28px 0}.stat,.deal,.cta{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:24px;padding:18px;box-shadow:0 18px 60px rgba(0,0,0,.22)}.stat strong{font-size:34px;display:block}.stat span{color:var(--muted);font-size:14px}.section-head{display:flex;justify-content:space-between;gap:16px;align-items:flex-end;margin:36px 0 14px}h2{font-size:26px;margin:0}.updated{color:var(--muted);font-size:14px}.deals{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.deal{min-height:190px;display:flex;flex-direction:column;justify-content:space-between}.deal .shop{color:var(--green);font-weight:700;font-size:14px}.deal h3{font-size:20px;margin:10px 0 8px;line-height:1.25}.price{display:flex;align-items:baseline;gap:10px}.now{font-size:28px;font-weight:900;color:var(--mango)}.was{color:var(--muted);text-decoration:line-through}.drop,.pill{display:inline-flex;width:max-content;border-radius:999px;padding:6px 10px;background:rgba(255,107,87,.14);color:#ff9b8d;font-weight:800;font-size:13px}.drop.first{background:rgba(169,173,155,.14);color:#c7cbb9}.drop.new{background:rgba(255,107,87,.14);color:#ff9b8d}.pill.good{background:rgba(142,224,111,.14);color:#a7ef8d}.pill.warn{background:rgba(255,177,27,.16);color:#ffd17a}.pill.bad{background:rgba(255,107,87,.16);color:#ff9b8d}.why,.evidence,.tags,.compare,.flight-meta{color:var(--muted);font-size:13px;line-height:1.45}.why{margin-top:8px}.evidence{margin-top:10px}.tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}.tags span{border:1px solid var(--line);border-radius:999px;padding:3px 7px}.compare{margin-top:12px;border:1px solid var(--line);border-radius:16px;padding:12px;background:rgba(255,255,255,.03)}.compare-title{color:var(--ink);font-weight:800;margin-bottom:8px}.compare-row,.external-row{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:6px 0;border-top:1px solid rgba(255,255,255,.06)}.compare-row:first-of-type,.external-row:first-of-type{border-top:0}.mini-link{color:var(--mango);font-weight:800;text-decoration:none}.flights{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}.flight-card{background:linear-gradient(180deg,rgba(255,255,255,.07),rgba(255,255,255,.03));border:1px solid var(--line);border-radius:24px;padding:18px}.route{font-size:21px;font-weight:900}.save{color:var(--green);font-weight:900}.inventory{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}.cta{margin-top:18px;display:flex;justify-content:space-between;align-items:center;gap:20px}.cta p{margin:6px 0 0;color:var(--muted)}button,.button{border:0;border-radius:16px;background:var(--mango);color:#191000;font-weight:900;padding:14px 18px;text-decoration:none;white-space:nowrap}.empty{color:var(--muted);border:1px dashed var(--line);border-radius:20px;padding:22px}@media(max-width:820px){.grid,.deals,.flights,.inventory{grid-template-columns:1fr 1fr}.cta{align-items:flex-start;flex-direction:column}}@media(max-width:560px){main{padding-top:24px}.grid,.deals,.flights,.inventory{grid-template-columns:1fr}.hero h1{font-size:44px}}
  </style>
</head>
<body>
  <main>
    <div class="hero">
      <div class="badge">🥭 망고여행 가격하락 실험실 <span id="today">—</span></div>
      <h1 id="heroTitle">오늘 발견한<br/><span class="mango">신저가만</span> 모았습니다.</h1>
      <p id="heroSubtitle">마이리얼트립 기반 여행 상품 후보와 가격 변화를 검증하는 초경량 실험 페이지입니다.</p>
      <div class="grid">
        <div class="stat"><strong id="joins">—</strong><span>합류</span></div>
        <div class="stat"><strong id="clicks">—</strong><span>클릭</span></div>
        <div class="stat"><strong id="payments">—</strong><span>결제</span></div>
        <div class="stat"><strong id="savingTotal">—</strong><span>누적 절약</span></div>
      </div>
    </div>

    <div class="section-head">
      <h2 id="dealsHeading">오늘의 비교 SKU</h2>
      <div class="updated" id="updatedAt">업데이트 확인 중…</div>
    </div>
    <section class="deals" id="deals"></section>

<section class="section-head">
      <h2>발견한 신저가</h2>
      <div class="updated" id="airfareUpdatedAt">자몽 피드 확인 중…</div>
    </section>
    <section class="flights" id="airfareDeals"></section>

    <section class="section-head">
      <h2>운영 중인 망고팀 인벤토리</h2>
      <div class="updated" id="inventoryUpdatedAt">팀 지표 확인 중…</div>
    </section>
    <section class="inventory" id="inventoryStats"></section>

    <section class="cta">
      <div>
        <h2>망고팀에 합류하세요</h2>
        <p>가격 비교, 신저가 탐지, 제휴 전환까지 같이 키워갈 실험실입니다.</p>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap"><a class="button" id="telegramJoin" href="https://t.me/superguava_9_bot" target="_blank" rel="noopener">Telegram 합류</a><a class="button" id="emailJoin" href="mailto:ninefirebar@gmail.com">Email 문의</a></div>
    </section>
  </main>
  <script>
    const money = n => Number.isFinite(Number(n)) ? '₩' + new Intl.NumberFormat('ko-KR').format(n) : '';
    const esc = v => String(v ?? '').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
    const safeUrl = v => esc(v || '#');
    const lowLabel = d => d.lowType === 'new_low' ? '오늘의 가격하락' : (d.lowType === 'first_collected' ? '첫 수집가' : (d.label || '확인 필요'));
    const pick = r => r.status === 'fulfilled' ? r.value : null;
    async function getJson(path){ const res = await fetch(path, {cache:'no-store'}); if(!res.ok) throw new Error(path); return res.json(); }
    function verdictPill(v){
      if(!v) return '';
      const delta = money(Math.abs(v.deltaWon || 0));
      if(v.mrtIsCheapest) return Number(v.savingPct || 0) >= 5
        ? `<div class="pill good">🟢 마이리얼트립이 ${Math.round(v.savingPct)}% 더 쌉니다 (${delta} 저렴)</div>`
        : `<div class="pill warn">🟡 거의 동률 (${delta} 차이)</div>`;
      return Number(v.overpayPct || 0) >= 5
        ? `<div class="pill bad">🔴 외부가 ${Math.round(v.overpayPct)}% 더 쌉니다 (${delta})</div>`
        : `<div class="pill warn">🟡 사실상 동률</div>`;
    }
    function renderComparison(pc){
      if(!pc || !pc.verdict || !Array.isArray(pc.sources) || !pc.sources.length) return '';
      return `<div class="compare"><div class="compare-title">다른 OTA 가격</div>${pc.sources.slice(0,5).map(src => {
        const cta = src.affiliateUrl || src.url;
        return `<div class="compare-row"><span>${esc(src.seller)} ${money(src.price)}</span><a class="mini-link" href="${safeUrl(cta)}" target="_blank" rel="noopener">보기</a></div>`;
      }).join('')}<div style="margin-top:10px">${verdictPill(pc.verdict)}</div></div>`;
    }
    function renderDeals(data){
      const deals = Array.isArray(data?.deals) ? data.deals : [];
      if(data?.runId?.startsWith('mb-curated-')) document.getElementById('dealsHeading').textContent = '오늘의 비교 SKU';
      document.getElementById('today').textContent = '— ' + (data?.date || '');
      if (data?.theme?.title) document.getElementById('heroTitle').textContent = data.theme.title;
      if (data?.theme?.subtitle) document.getElementById('heroSubtitle').textContent = data.theme.subtitle;
      document.getElementById('updatedAt').textContent = '마지막 업데이트 ' + (data?.updatedAt || data?.lastSweepAt || '확인 중');
      const root = document.getElementById('deals');
      root.innerHTML = deals.length ? deals.map(d => {
        const was = (d.lowType === 'new_low' && typeof d.previousPrice === 'number' && d.previousPrice > 0) ? `<span class="was">${money(d.previousPrice)}</span>` : '';
        const why = d.display?.why ? `<div class="why">${esc(d.display.why)}</div>` : '';
        const reason = d.evidence?.reason ? `<div class="evidence">근거: ${esc(d.evidence.reason)}</div>` : '';
        const tags = Array.isArray(d.tags) && d.tags.length ? `<div class="tags">${d.tags.map(t => `<span>${esc(t)}</span>`).join('')}</div>` : '';
        return `<article class="deal"><div><div class="shop">${esc(d.shop)}${d.reviewScore ? ' · ★ ' + esc(d.reviewScore) : ''}</div><h3>${esc(d.title)}</h3><div class="price"><span class="now">${money(d.price)}</span>${was}</div>${why}${tags}${renderComparison(d.priceComparison)}</div><div>${reason}<div style="display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:12px"><div class="drop ${d.lowType === 'new_low' ? 'new' : 'first'}">${esc(lowLabel(d))}</div><a class="button" style="padding:9px 11px;border-radius:12px;font-size:13px" href="${safeUrl(d.url)}" target="_blank" rel="noopener">보기</a></div></div></article>`;
      }).join('') : '<div class="empty">오늘 비교할 SKU가 아직 없습니다.</div>';
      return deals;
    }
    function renderAirfare(data){
      const cards = Array.isArray(data?.cards) ? data.cards : [];
      document.getElementById('airfareUpdatedAt').textContent = data?.checkedAt ? '자몽 업데이트 ' + data.checkedAt : '자몽 피드 확인 중…';
      const root = document.getElementById('airfareDeals');
      root.innerHTML = cards.length ? cards.map(c => {
        const ext = c.external || {};
        return `<article class="flight-card"><div class="route">${esc(c.origin)} → ${esc(c.destination)}</div><div class="flight-meta">${esc(c.depart)} · ${esc(c.carrier)} ${c.intl ? '국제선' : '국내선'}</div><div class="price" style="margin-top:10px"><span class="now">${money(c.price)}</span><span class="was">${money(c.baseline)}</span></div><div class="pill good" style="margin-top:10px">${money(c.save)} 절약</div><div class="external-row" style="margin-top:12px"><span>외부 비교</span><span>${Object.entries(ext).map(([k,u]) => `<a class="mini-link" href="${safeUrl(u)}" target="_blank" rel="noopener">${esc(k)}</a>`).join(' · ')}</span></div><a class="button" style="display:block;text-align:center;margin-top:12px" href="${safeUrl(c.mylink)}" target="_blank" rel="noopener">이 가격으로 예약 →</a></article>`;
      }).join('') : '<div class="empty">자몽 신저가 카드가 아직 없습니다.</div>';
    }
    function renderTeam(team, dealsData){
      const funnel = team?.funnel || dealsData?.metrics || {};
      document.getElementById('joins').textContent = funnel.joins ?? '—';
      document.getElementById('clicks').textContent = funnel.clicks ?? '—';
      document.getElementById('payments').textContent = funnel.payments ?? '—';
      document.getElementById('savingTotal').textContent = team?.savings?.airfareTotal ? money(team.savings.airfareTotal) : '—';
      document.getElementById('inventoryUpdatedAt').textContent = team?.checkedAt ? '팀 지표 업데이트 ' + team.checkedAt : '팀 지표 확인 중…';
      const inv = team?.inventory || {};
      document.getElementById('inventoryStats').innerHTML = ['flights','stays','experiences'].map(k => `<div class="stat"><strong>${inv[k] ?? '—'}</strong><span>${k}</span></div>`).join('');
      if(team?.cta?.telegramJoinUrl) document.getElementById('telegramJoin').href = team.cta.telegramJoinUrl;
      if(team?.cta?.emailJoin) document.getElementById('emailJoin').href = 'mailto:' + team.cta.emailJoin;
    }
    async function boot(){
      const [dealsR, airfareR, teamR] = await Promise.allSettled([getJson('./data/deals.json'), getJson('./data/airfare_lowprice.json'), getJson('./data/team_metrics.json')]);
      const dealsData = pick(dealsR) || {};
      renderDeals(dealsData);
      renderAirfare(pick(airfareR));
      renderTeam(pick(teamR), dealsData);
    }
    boot().catch(()=>{document.getElementById('deals').innerHTML='<div class="empty">데이터를 불러오지 못했습니다.</div>'});
  </script>
</body>
</html>
